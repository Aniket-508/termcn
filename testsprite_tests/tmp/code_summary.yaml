version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16 (App Router, static generation)
  - React 19
  - Tailwind CSS 4
  - Radix UI / shadcn-style components
  - Fumadocs MDX (documentation content)
  - Ink (documented terminal UI library)
routes:
  - path: /
    file: app/(app)/(root)/page.tsx
    auth_required: false
    description: Marketing home with hero, CTAs, and embedded component preview demos
  - path: /docs
    file: app/(app)/docs/[[...slug]]/page.tsx
    auth_required: false
    description: Documentation index and nested doc pages (installation, components, theming, registry, changelog, MCP, templates, etc.)
  - path: /docs/installation
    file: app/(app)/docs/[[...slug]]/page.tsx
    auth_required: false
    description: Installation guide
  - path: /docs/components
    file: app/(app)/docs/[[...slug]]/page.tsx
    auth_required: false
    description: Components section root
  - path: /docs/changelog
    file: app/(app)/docs/[[...slug]]/page.tsx
    auth_required: false
    description: Changelog
  - path: /docs/theming
    file: app/(app)/docs/[[...slug]]/page.tsx
    auth_required: false
    description: Theming documentation
  - path: /docs/registry
    file: app/(app)/docs/[[...slug]]/page.tsx
    auth_required: false
    description: Registry documentation
  - path: /docs/mcp
    file: app/(app)/docs/[[...slug]]/page.tsx
    auth_required: false
    description: MCP-related docs
  - path: /llms.txt
    file: app/llms.txt/route.tsx
    auth_required: false
    description: Plain-text export for LLMs
  - path: /llms-full.txt
    file: app/llms-full.txt/route.ts
    auth_required: false
    description: Full LLM-oriented text export
features:
  - name: Browse marketing home
    description: Landing page explains termcn (terminal UIs for React/Ink) and links into documentation
    files:
      - app/(app)/(root)/page.tsx
      - components/component-preview.tsx
      - components/site-header.tsx
    entry_route: /
    user_interactions:
      - Scroll hero and marketing sections
      - Click primary navigation links (e.g. Get Started / Docs)
      - View embedded component preview cards on the homepage
    api_calls: []
    auth_required: false
  - name: Read documentation
    description: MDX-based docs with sidebar, breadcrumbs, table of contents, copy-page control, and prev/next navigation
    files:
      - app/(app)/docs/[[...slug]]/page.tsx
      - app/(app)/docs/layout.tsx
      - components/docs-toc.tsx
      - components/docs-copy-page.tsx
      - mdx-components.tsx
    entry_route: /docs
    user_interactions:
      - Open docs from header or home CTA
      - Navigate sidebar to a doc page
      - Scroll long pages and use table of contents anchors
      - Use copy-page or external doc links where offered
      - Use previous/next article navigation between pages
    api_calls: []
    auth_required: false
  - name: LLM-oriented exports
    description: Serves aggregated text/markdown exports for tooling and LLM context
    files:
      - app/llms-full.txt/route.ts
      - app/llms.mdx/docs/[[...slug]]/route.ts
    entry_route: /llms.txt
    user_interactions:
      - Request /llms.txt or /llms-full.txt in browser or client
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Very large number of static doc URLs; exhaustive UI enumeration is impractical in one pass
    location: app/(app)/docs/[[...slug]]/page.tsx
    impact: Automated tests should focus on representative docs paths and global navigation shell
